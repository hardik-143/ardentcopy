<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" fill="none">
  <style>
    :root {
    --background: #f1f6f6;
    --foreground: #061414;
    --card: #e4eded;
    --card-foreground: #061414;
    --popover: #f6fbfb;
    --popover-foreground: #061414;
    --primary: #006574;
    --primary-foreground: #f6fbfb;
    --secondary: #ec6100;
    --secondary-foreground: #f6fbfb;
    --muted: #d9e4e4;
    --muted-foreground: #006574;
    --accent: #c2e7e1;
    --accent-foreground: #061414;
    --destructive: #1f1f1f;
    --destructive-foreground: #f6fbfb;
    --border: #b0c2c2;
    --input: #006574;
    --ring: #ec6100;
    --chart-1: #006574;
    --chart-2: #ec6100;
    --chart-3: #c2e7e1;
    --chart-4: #b0c2c2;
    --chart-5: #1f1f1f;
    --sidebar: #e4eded;
    --sidebar-foreground: #061414;
    --sidebar-primary: #006574;
    --sidebar-primary-foreground: #f6fbfb;
    --sidebar-accent: #ec6100;
    --sidebar-accent-foreground: #f6fbfb;
    --sidebar-border: #b0c2c2;
    --sidebar-ring: #ec6100;
    --font-sans: Roboto, ui-sans-serif, system-ui, sans-serif;
    --font-serif: ui-serif, Georgia, Cambria, "Times New Roman", Times, serif;
    --font-mono:
    ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono",
    "Courier New", monospace;
    --radius: 0.375rem;
    --shadow-x: 0px;
    --shadow-y: 5px;
    --shadow-blur: 3px;
    --shadow-spread: 0px;
    --shadow-opacity: 0.1;
    --shadow-color: #000000;
    --shadow-2xs: 0px 5px 3px 0px hsl(0 0% 0% / 0.05);
    --shadow-xs: 0px 5px 3px 0px hsl(0 0% 0% / 0.05);
    --shadow-sm:
    0px 5px 3px 0px hsl(0 0% 0% / 0.1), 0px 1px 2px -1px hsl(0 0% 0% / 0.1);
    --shadow:
    0px 5px 3px 0px hsl(0 0% 0% / 0.1), 0px 1px 2px -1px hsl(0 0% 0% / 0.1);
    --shadow-md:
    0px 5px 3px 0px hsl(0 0% 0% / 0.1), 0px 2px 4px -1px hsl(0 0% 0% / 0.1);
    --shadow-lg:
    0px 5px 3px 0px hsl(0 0% 0% / 0.1), 0px 4px 6px -1px hsl(0 0% 0% / 0.1);
    --shadow-xl:
    0px 5px 3px 0px hsl(0 0% 0% / 0.1), 0px 8px 10px -1px hsl(0 0% 0% / 0.1);
    --shadow-2xl: 0px 5px 3px 0px hsl(0 0% 0% / 0.25);
    --tracking-normal: 0em;
    --spacing: 0.25rem;
    --preview-hero-bg: #030d0f;
    --preview-hero-fg: #e1eaea;
    --preview-hero-muted: #619b9e;
    --preview-icon-circle: #04181c;
    }
    text {
      font-family: var(--font-sans), system-ui, sans-serif;
    }
  </style>
  <rect width="320" height="200" rx="6" fill="var(--background)"/>
  <text x="20" y="36" fill="var(--foreground)" font-size="12" font-weight="700">Our Approach to</text>
  <text x="20" y="52" fill="var(--foreground)" font-size="12" font-weight="700">Your Case</text>
  <text x="20" y="72" fill="var(--secondary-foreground)" font-size="6.5">We take a client-first approach to every</text>
  <text x="20" y="82" fill="var(--secondary-foreground)" font-size="6.5">case we handle. From the initial consult</text>
  <text x="20" y="92" fill="var(--secondary-foreground)" font-size="6.5">to the final verdict, our team is with you.</text>
  <text x="20" y="110" fill="var(--secondary-foreground)" font-size="6.5">Our attorneys work closely with medical</text>
  <text x="20" y="120" fill="var(--secondary-foreground)" font-size="6.5">experts, investigators, and specialists to</text>
  <text x="20" y="130" fill="var(--secondary-foreground)" font-size="6.5">build the strongest possible case.</text>
  <text x="20" y="148" fill="var(--secondary-foreground)" font-size="6.5">We keep you informed at every step and</text>
  <text x="20" y="158" fill="var(--secondary-foreground)" font-size="6.5">fight aggressively for maximum recovery.</text>
  <rect x="172" y="24" width="132" height="152" rx="8" fill="var(--muted)" stroke="var(--border)" stroke-width="0.5"/>
  <circle cx="210" cy="82" r="8" fill="var(--border)" opacity="0.6"/>
  <polygon points="196,120 228,96 260,120" fill="var(--border)" opacity="0.5"/>
  <polygon points="210,120 234,104 260,120" fill="var(--muted-foreground)" opacity="0.35"/>
  <text x="238" y="148" text-anchor="middle" fill="var(--muted-foreground)" font-size="5.5">Image or video</text>
</svg>
