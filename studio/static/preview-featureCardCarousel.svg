<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" fill="none">
  <style>
    :root {
    --background: #f1f6f6;
    --foreground: #061414;
    --card: #e4eded;
    --card-foreground: #061414;
    --popover: #f6fbfb;
    --popover-foreground: #061414;
    --primary: #006574;
    --primary-foreground: #f6fbfb;
    --secondary: #ec6100;
    --secondary-foreground: #f6fbfb;
    --muted: #d9e4e4;
    --muted-foreground: #006574;
    --accent: #c2e7e1;
    --accent-foreground: #061414;
    --destructive: #1f1f1f;
    --destructive-foreground: #f6fbfb;
    --border: #b0c2c2;
    --input: #006574;
    --ring: #ec6100;
    --chart-1: #006574;
    --chart-2: #ec6100;
    --chart-3: #c2e7e1;
    --chart-4: #b0c2c2;
    --chart-5: #1f1f1f;
    --sidebar: #e4eded;
    --sidebar-foreground: #061414;
    --sidebar-primary: #006574;
    --sidebar-primary-foreground: #f6fbfb;
    --sidebar-accent: #ec6100;
    --sidebar-accent-foreground: #f6fbfb;
    --sidebar-border: #b0c2c2;
    --sidebar-ring: #ec6100;
    --font-sans: Roboto, ui-sans-serif, system-ui, sans-serif;
    --font-serif: ui-serif, Georgia, Cambria, "Times New Roman", Times, serif;
    --font-mono:
    ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono",
    "Courier New", monospace;
    --radius: 0.375rem;
    --shadow-x: 0px;
    --shadow-y: 5px;
    --shadow-blur: 3px;
    --shadow-spread: 0px;
    --shadow-opacity: 0.1;
    --shadow-color: #000000;
    --shadow-2xs: 0px 5px 3px 0px hsl(0 0% 0% / 0.05);
    --shadow-xs: 0px 5px 3px 0px hsl(0 0% 0% / 0.05);
    --shadow-sm:
    0px 5px 3px 0px hsl(0 0% 0% / 0.1), 0px 1px 2px -1px hsl(0 0% 0% / 0.1);
    --shadow:
    0px 5px 3px 0px hsl(0 0% 0% / 0.1), 0px 1px 2px -1px hsl(0 0% 0% / 0.1);
    --shadow-md:
    0px 5px 3px 0px hsl(0 0% 0% / 0.1), 0px 2px 4px -1px hsl(0 0% 0% / 0.1);
    --shadow-lg:
    0px 5px 3px 0px hsl(0 0% 0% / 0.1), 0px 4px 6px -1px hsl(0 0% 0% / 0.1);
    --shadow-xl:
    0px 5px 3px 0px hsl(0 0% 0% / 0.1), 0px 8px 10px -1px hsl(0 0% 0% / 0.1);
    --shadow-2xl: 0px 5px 3px 0px hsl(0 0% 0% / 0.25);
    --tracking-normal: 0em;
    --spacing: 0.25rem;
    --preview-hero-bg: #030d0f;
    --preview-hero-fg: #e1eaea;
    --preview-hero-muted: #619b9e;
    --preview-icon-circle: #04181c;
    }
    text {
      font-family: var(--font-sans), system-ui, sans-serif;
    }
  </style>
  <defs>
    <linearGradient id="fadeL" x1="0" y1="0" x2="20" y2="0">
      <stop offset="0%" stop-color="var(--muted)"/>
      <stop offset="100%" stop-color="var(--muted)" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="fadeR" x1="0" y1="0" x2="20" y2="0">
      <stop offset="0%" stop-color="var(--muted)" stop-opacity="0"/>
      <stop offset="100%" stop-color="var(--muted)"/>
    </linearGradient>
  </defs>
  <rect width="320" height="200" rx="6" fill="var(--muted)"/>
  <rect x="132" y="8" width="56" height="16" rx="8" fill="var(--border)"/>
  <text x="160" y="19" text-anchor="middle" fill="var(--secondary-foreground)" font-size="6.5">Results</text>
  <text x="160" y="40" text-anchor="middle" fill="var(--foreground)" font-size="13" font-weight="700">Recent Victories</text>
  <text x="160" y="54" text-anchor="middle" fill="var(--muted-foreground)" font-size="6.5">Exposed recoveries our clients have received</text>
  <rect x="0" y="64" width="20" height="100" fill="url(#fadeL)"/>
  <rect x="300" y="64" width="20" height="100" fill="url(#fadeR)"/>
  <rect x="14" y="66" width="84" height="94" rx="6" fill="var(--background)" stroke="var(--border)" stroke-width="0.8"/>
  <text x="24" y="82" fill="var(--foreground)" font-size="9" font-weight="700">$75,000</text>
  <text x="24" y="94" fill="var(--muted-foreground)" font-size="5.5">Settlement for motor</text>
  <text x="24" y="102" fill="var(--muted-foreground)" font-size="5.5">vehicle accident injury</text>
  <rect x="24" y="116" width="64" height="0.6" fill="var(--border)"/>
  <text x="24" y="128" fill="var(--muted-foreground)" font-size="5.5">Gillani Law</text>
  <rect x="62" y="122" width="30" height="12" rx="3" fill="var(--preview-success-soft)"/>
  <text x="77" y="131" text-anchor="middle" fill="var(--primary)" font-size="5.5" font-weight="600">✓ Won</text>
  <rect x="106" y="66" width="84" height="94" rx="6" fill="var(--preview-warm-surface)" stroke="var(--ring)" stroke-width="1.2"/>
  <rect x="156" y="66" width="34" height="13" rx="3" fill="var(--chart-4)"/>
  <text x="173" y="75" text-anchor="middle" fill="var(--primary-foreground)" font-size="5" font-weight="700">MAJOR WIN</text>
  <text x="116" y="82" fill="var(--foreground)" font-size="9" font-weight="700">$450,000</text>
  <text x="116" y="94" fill="var(--muted-foreground)" font-size="5.5">Medical malpractice</text>
  <text x="116" y="102" fill="var(--muted-foreground)" font-size="5.5">wrongful treatment case</text>
  <rect x="116" y="116" width="64" height="0.6" fill="var(--preview-warm-line)"/>
  <text x="116" y="128" fill="var(--muted-foreground)" font-size="5.5">Gillani Law</text>
  <rect x="154" y="122" width="30" height="12" rx="3" fill="var(--preview-warm-pill)"/>
  <text x="169" y="131" text-anchor="middle" fill="var(--chart-5)" font-size="5.5" font-weight="600">✓ Won</text>
  <rect x="198" y="66" width="84" height="94" rx="6" fill="var(--background)" stroke="var(--border)" stroke-width="0.8"/>
  <text x="208" y="82" fill="var(--foreground)" font-size="9" font-weight="700">$120,000</text>
  <text x="208" y="94" fill="var(--muted-foreground)" font-size="5.5">Workplace injury</text>
  <text x="208" y="102" fill="var(--muted-foreground)" font-size="5.5">compensation claim</text>
  <rect x="208" y="116" width="64" height="0.6" fill="var(--border)"/>
  <text x="208" y="128" fill="var(--muted-foreground)" font-size="5.5">Gillani Law</text>
  <rect x="246" y="122" width="30" height="12" rx="3" fill="var(--preview-success-soft)"/>
  <text x="261" y="131" text-anchor="middle" fill="var(--primary)" font-size="5.5" font-weight="600">✓ Won</text>
  <rect x="84" y="172" width="152" height="20" rx="10" fill="var(--preview-summary-pill)"/>
  <circle cx="100" cy="182" r="3" fill="var(--primary)" opacity="0.8"/>
  <text x="166" y="186" text-anchor="middle" fill="var(--accent-foreground)" font-size="7" font-weight="600">Over $2.3M in Recoveries</text>
</svg>
