<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" fill="none">
  <style>
    :root {
    --background: #f1f6f6;
    --foreground: #061414;
    --card: #e4eded;
    --card-foreground: #061414;
    --popover: #f6fbfb;
    --popover-foreground: #061414;
    --primary: #006574;
    --primary-foreground: #f6fbfb;
    --secondary: #ec6100;
    --secondary-foreground: #f6fbfb;
    --muted: #d9e4e4;
    --muted-foreground: #006574;
    --accent: #c2e7e1;
    --accent-foreground: #061414;
    --destructive: #1f1f1f;
    --destructive-foreground: #f6fbfb;
    --border: #b0c2c2;
    --input: #006574;
    --ring: #ec6100;
    --chart-1: #006574;
    --chart-2: #ec6100;
    --chart-3: #c2e7e1;
    --chart-4: #b0c2c2;
    --chart-5: #1f1f1f;
    --sidebar: #e4eded;
    --sidebar-foreground: #061414;
    --sidebar-primary: #006574;
    --sidebar-primary-foreground: #f6fbfb;
    --sidebar-accent: #ec6100;
    --sidebar-accent-foreground: #f6fbfb;
    --sidebar-border: #b0c2c2;
    --sidebar-ring: #ec6100;
    --font-sans: Roboto, ui-sans-serif, system-ui, sans-serif;
    --font-serif: ui-serif, Georgia, Cambria, "Times New Roman", Times, serif;
    --font-mono:
    ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono",
    "Courier New", monospace;
    --radius: 0.375rem;
    --shadow-x: 0px;
    --shadow-y: 5px;
    --shadow-blur: 3px;
    --shadow-spread: 0px;
    --shadow-opacity: 0.1;
    --shadow-color: #000000;
    --shadow-2xs: 0px 5px 3px 0px hsl(0 0% 0% / 0.05);
    --shadow-xs: 0px 5px 3px 0px hsl(0 0% 0% / 0.05);
    --shadow-sm:
    0px 5px 3px 0px hsl(0 0% 0% / 0.1), 0px 1px 2px -1px hsl(0 0% 0% / 0.1);
    --shadow:
    0px 5px 3px 0px hsl(0 0% 0% / 0.1), 0px 1px 2px -1px hsl(0 0% 0% / 0.1);
    --shadow-md:
    0px 5px 3px 0px hsl(0 0% 0% / 0.1), 0px 2px 4px -1px hsl(0 0% 0% / 0.1);
    --shadow-lg:
    0px 5px 3px 0px hsl(0 0% 0% / 0.1), 0px 4px 6px -1px hsl(0 0% 0% / 0.1);
    --shadow-xl:
    0px 5px 3px 0px hsl(0 0% 0% / 0.1), 0px 8px 10px -1px hsl(0 0% 0% / 0.1);
    --shadow-2xl: 0px 5px 3px 0px hsl(0 0% 0% / 0.25);
    --tracking-normal: 0em;
    --spacing: 0.25rem;
    --preview-hero-bg: #030d0f;
    --preview-hero-fg: #e1eaea;
    --preview-hero-muted: #619b9e;
    --preview-icon-circle: #04181c;
    }
    text {
      font-family: var(--font-sans), system-ui, sans-serif;
    }
  </style>
  <rect width="320" height="200" rx="6" fill="var(--background)"/>
  <rect x="138" y="10" width="44" height="16" rx="8" fill="var(--border)"/>
  <text x="160" y="21" text-anchor="middle" fill="var(--secondary-foreground)" font-size="6.5">FAQ</text>
  <text x="160" y="42" text-anchor="middle" fill="var(--foreground)" font-size="12" font-weight="700">Frequently Asked Questions</text>
  <text x="160" y="55" text-anchor="middle" fill="var(--muted-foreground)" font-size="6.5">Find answers to common questions below</text>
  <rect x="80" y="68" width="160" height="0.8" fill="var(--border)"/>
  <text x="84" y="80" fill="var(--foreground)" font-size="7" font-weight="600">What are your fees?</text>
  <text x="232" y="80" fill="var(--muted-foreground)" font-size="8">▾</text>
  <text x="84" y="92" fill="var(--muted-foreground)" font-size="6">We work on a contingency basis — no fee</text>
  <text x="84" y="100" fill="var(--muted-foreground)" font-size="6">unless we win your case.</text>
  <rect x="80" y="108" width="160" height="0.8" fill="var(--border)"/>
  <text x="84" y="120" fill="var(--foreground)" font-size="7" font-weight="600">How long does a case take?</text>
  <text x="232" y="120" fill="var(--muted-foreground)" font-size="8">▸</text>
  <rect x="80" y="128" width="160" height="0.8" fill="var(--border)"/>
  <text x="84" y="140" fill="var(--foreground)" font-size="7" font-weight="600">Do I need to go to court?</text>
  <text x="232" y="140" fill="var(--muted-foreground)" font-size="8">▸</text>
  <rect x="80" y="148" width="160" height="0.8" fill="var(--border)"/>
  <text x="84" y="160" fill="var(--foreground)" font-size="7" font-weight="600">What if I can't afford a lawyer?</text>
  <text x="232" y="160" fill="var(--muted-foreground)" font-size="8">▸</text>
  <rect x="80" y="168" width="160" height="0.8" fill="var(--border)"/>
  <text x="84" y="180" fill="var(--muted-foreground)" font-size="5.5">Still have questions?</text>
  <text x="84" y="190" fill="var(--foreground)" font-size="6.5" font-weight="600">Contact our team</text>
  <circle cx="140" cy="187" r="6" stroke="var(--border)" stroke-width="0.8" fill="none"/>
  <text x="140" y="190" text-anchor="middle" fill="var(--muted-foreground)" font-size="6">↗</text>
</svg>
