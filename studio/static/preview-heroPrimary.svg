<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" fill="none">
  <style>
    :root {
    --background: #f1f6f6;
    --foreground: #061414;
    --card: #e4eded;
    --card-foreground: #061414;
    --popover: #f6fbfb;
    --popover-foreground: #061414;
    --primary: #006574;
    --primary-foreground: #f6fbfb;
    --secondary: #ec6100;
    --secondary-foreground: #f6fbfb;
    --muted: #d9e4e4;
    --muted-foreground: #006574;
    --accent: #c2e7e1;
    --accent-foreground: #061414;
    --destructive: #1f1f1f;
    --destructive-foreground: #f6fbfb;
    --border: #b0c2c2;
    --input: #006574;
    --ring: #ec6100;
    --chart-1: #006574;
    --chart-2: #ec6100;
    --chart-3: #c2e7e1;
    --chart-4: #b0c2c2;
    --chart-5: #1f1f1f;
    --sidebar: #e4eded;
    --sidebar-foreground: #061414;
    --sidebar-primary: #006574;
    --sidebar-primary-foreground: #f6fbfb;
    --sidebar-accent: #ec6100;
    --sidebar-accent-foreground: #f6fbfb;
    --sidebar-border: #b0c2c2;
    --sidebar-ring: #ec6100;
    --font-sans: Roboto, ui-sans-serif, system-ui, sans-serif;
    --font-serif: ui-serif, Georgia, Cambria, "Times New Roman", Times, serif;
    --font-mono:
    ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono",
    "Courier New", monospace;
    --radius: 0.375rem;
    --shadow-x: 0px;
    --shadow-y: 5px;
    --shadow-blur: 3px;
    --shadow-spread: 0px;
    --shadow-opacity: 0.1;
    --shadow-color: #000000;
    --shadow-2xs: 0px 5px 3px 0px hsl(0 0% 0% / 0.05);
    --shadow-xs: 0px 5px 3px 0px hsl(0 0% 0% / 0.05);
    --shadow-sm:
    0px 5px 3px 0px hsl(0 0% 0% / 0.1), 0px 1px 2px -1px hsl(0 0% 0% / 0.1);
    --shadow:
    0px 5px 3px 0px hsl(0 0% 0% / 0.1), 0px 1px 2px -1px hsl(0 0% 0% / 0.1);
    --shadow-md:
    0px 5px 3px 0px hsl(0 0% 0% / 0.1), 0px 2px 4px -1px hsl(0 0% 0% / 0.1);
    --shadow-lg:
    0px 5px 3px 0px hsl(0 0% 0% / 0.1), 0px 4px 6px -1px hsl(0 0% 0% / 0.1);
    --shadow-xl:
    0px 5px 3px 0px hsl(0 0% 0% / 0.1), 0px 8px 10px -1px hsl(0 0% 0% / 0.1);
    --shadow-2xl: 0px 5px 3px 0px hsl(0 0% 0% / 0.25);
    --tracking-normal: 0em;
    --spacing: 0.25rem;
    --preview-hero-bg: #030d0f;
    --preview-hero-fg: #e1eaea;
    --preview-hero-muted: #619b9e;
    --preview-icon-circle: #04181c;
    }
    text {
      font-family: var(--font-sans), system-ui, sans-serif;
    }
  </style>
  <rect width="320" height="200" rx="6" fill="var(--preview-hero-bg)"/>
  <rect width="320" height="200" rx="6" fill="var(--preview-scrim)"/>
  <rect x="20" y="58" width="140" height="18" rx="9" fill="var(--preview-on-hero-subtle)"/>
  <text x="90" y="71" text-anchor="middle" fill="var(--preview-hero-fg)" opacity="0.8" font-size="7">Personal Injury Attorney</text>
  <text x="20" y="98" fill="var(--preview-hero-fg)" font-size="14" font-weight="700">Fighting For Your</text>
  <text x="20" y="116" fill="var(--primary)" font-size="14" font-weight="700">Justice.</text>
  <text x="20" y="134" fill="var(--preview-hero-muted)" opacity="0.6" font-size="6.5">We fight to get you the compensation</text>
  <text x="20" y="143" fill="var(--preview-hero-muted)" opacity="0.5" font-size="6.5">you deserve. No fee unless we win.</text>
  <rect x="195" y="24" width="110" height="152" rx="6" fill="var(--preview-on-hero-subtle)" stroke="var(--primary)" stroke-width="0.8"/>
  <text x="250" y="44" text-anchor="middle" fill="var(--preview-hero-fg)" opacity="0.85" font-size="7" font-weight="600">Get Your</text>
  <text x="250" y="55" text-anchor="middle" fill="var(--primary)" font-size="8" font-weight="700">Free Consultation</text>
  <rect x="208" y="68" width="84" height="18" rx="4" fill="var(--primary)"/>
  <text x="250" y="80" text-anchor="middle" fill="var(--primary-foreground)" font-size="7" font-weight="600">Get Started</text>
  <text x="250" y="106" text-anchor="middle" fill="var(--preview-hero-muted)" font-size="5.5">– OR –</text>
  <rect x="208" y="112" width="84" height="16" rx="4" fill="none" stroke="var(--primary)" stroke-width="0.8"/>
  <text x="250" y="123" text-anchor="middle" fill="var(--primary)" font-size="6.5" font-weight="600">Call Us Now</text>
  <text x="250" y="140" text-anchor="middle" fill="var(--preview-hero-muted)" opacity="0.6" font-size="5">No fee unless we win.</text>
</svg>
