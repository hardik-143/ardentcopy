<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" fill="none">
  <title>Schedule consultation block preview</title>
  <style>
    :root {
    --background: #f1f6f6;
    --foreground: #061414;
    --card: #e4eded;
    --card-foreground: #061414;
    --popover: #f6fbfb;
    --popover-foreground: #061414;
    --primary: #006574;
    --primary-foreground: #f6fbfb;
    --secondary: #ec6100;
    --secondary-foreground: #f6fbfb;
    --muted: #d9e4e4;
    --muted-foreground: #006574;
    --accent: #c2e7e1;
    --accent-foreground: #061414;
    --destructive: #1f1f1f;
    --destructive-foreground: #f6fbfb;
    --border: #b0c2c2;
    --input: #006574;
    --ring: #ec6100;
    --chart-1: #006574;
    --chart-2: #ec6100;
    --chart-3: #c2e7e1;
    --chart-4: #b0c2c2;
    --chart-5: #1f1f1f;
    --sidebar: #e4eded;
    --sidebar-foreground: #061414;
    --sidebar-primary: #006574;
    --sidebar-primary-foreground: #f6fbfb;
    --sidebar-accent: #ec6100;
    --sidebar-accent-foreground: #f6fbfb;
    --sidebar-border: #b0c2c2;
    --sidebar-ring: #ec6100;
    --font-sans: Roboto, ui-sans-serif, system-ui, sans-serif;
    --font-serif: ui-serif, Georgia, Cambria, "Times New Roman", Times, serif;
    --font-mono:
    ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono",
    "Courier New", monospace;
    --radius: 0.375rem;
    --shadow-x: 0px;
    --shadow-y: 5px;
    --shadow-blur: 3px;
    --shadow-spread: 0px;
    --shadow-opacity: 0.1;
    --shadow-color: #000000;
    --shadow-2xs: 0px 5px 3px 0px hsl(0 0% 0% / 0.05);
    --shadow-xs: 0px 5px 3px 0px hsl(0 0% 0% / 0.05);
    --shadow-sm:
    0px 5px 3px 0px hsl(0 0% 0% / 0.1), 0px 1px 2px -1px hsl(0 0% 0% / 0.1);
    --shadow:
    0px 5px 3px 0px hsl(0 0% 0% / 0.1), 0px 1px 2px -1px hsl(0 0% 0% / 0.1);
    --shadow-md:
    0px 5px 3px 0px hsl(0 0% 0% / 0.1), 0px 2px 4px -1px hsl(0 0% 0% / 0.1);
    --shadow-lg:
    0px 5px 3px 0px hsl(0 0% 0% / 0.1), 0px 4px 6px -1px hsl(0 0% 0% / 0.1);
    --shadow-xl:
    0px 5px 3px 0px hsl(0 0% 0% / 0.1), 0px 8px 10px -1px hsl(0 0% 0% / 0.1);
    --shadow-2xl: 0px 5px 3px 0px hsl(0 0% 0% / 0.25);
    --tracking-normal: 0em;
    --spacing: 0.25rem;
    --preview-hero-bg: #030d0f;
    --preview-hero-fg: #e1eaea;
    --preview-hero-muted: #619b9e;
    --preview-icon-circle: #04181c;
    }
    text {
      font-family: var(--font-sans), system-ui, sans-serif;
    }
  </style>
  <rect width="320" height="200" fill="var(--muted)"/>
  <text x="24" y="28" fill="var(--foreground)" font-size="12" font-weight="600">Schedule A Free Consultation</text>
  <text x="24" y="48" fill="var(--muted-foreground)" font-size="6">Partner with one of the top-rated...</text>
  <rect x="24" y="56" width="10" height="10" rx="2" fill="var(--primary)"/>
  <text x="38" y="64" fill="var(--secondary-foreground)" font-size="6">404-900-1500</text>
  <rect x="24" y="72" width="10" height="10" rx="2" fill="var(--primary)"/>
  <text x="38" y="80" fill="var(--secondary-foreground)" font-size="6">sgillani@gillanilaw.com</text>
  <rect x="24" y="88" width="10" height="10" rx="2" fill="var(--primary)"/>
  <text x="38" y="96" fill="var(--secondary-foreground)" font-size="6">2302 Parklake Dr., Suite 320...</text>
  <rect x="188" y="56" width="104" height="22" rx="10" fill="var(--primary)"/>
  <text x="240" y="70" text-anchor="middle" fill="var(--primary-foreground)" font-size="7" font-weight="600">Hire us today</text>
  <text x="240" y="96" text-anchor="middle" fill="var(--muted-foreground)" font-size="6">- OR -</text>
  <rect x="188" y="104" width="104" height="22" rx="10" fill="none" stroke="var(--primary)" stroke-width="1.5"/>
  <text x="240" y="118" text-anchor="middle" fill="var(--primary)" font-size="7" font-weight="600">Schedule a call</text>
  <text x="240" y="142" text-anchor="middle" fill="var(--muted-foreground)" font-size="5">No fee unless we win.</text>
</svg>
