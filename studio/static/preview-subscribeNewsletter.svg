<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" fill="none">
  <style>
    :root {
    --background: #f1f6f6;
    --foreground: #061414;
    --card: #e4eded;
    --card-foreground: #061414;
    --popover: #f6fbfb;
    --popover-foreground: #061414;
    --primary: #006574;
    --primary-foreground: #f6fbfb;
    --secondary: #ec6100;
    --secondary-foreground: #f6fbfb;
    --muted: #d9e4e4;
    --muted-foreground: #006574;
    --accent: #c2e7e1;
    --accent-foreground: #061414;
    --destructive: #1f1f1f;
    --destructive-foreground: #f6fbfb;
    --border: #b0c2c2;
    --input: #006574;
    --ring: #ec6100;
    --chart-1: #006574;
    --chart-2: #ec6100;
    --chart-3: #c2e7e1;
    --chart-4: #b0c2c2;
    --chart-5: #1f1f1f;
    --sidebar: #e4eded;
    --sidebar-foreground: #061414;
    --sidebar-primary: #006574;
    --sidebar-primary-foreground: #f6fbfb;
    --sidebar-accent: #ec6100;
    --sidebar-accent-foreground: #f6fbfb;
    --sidebar-border: #b0c2c2;
    --sidebar-ring: #ec6100;
    --font-sans: Roboto, ui-sans-serif, system-ui, sans-serif;
    --font-serif: ui-serif, Georgia, Cambria, "Times New Roman", Times, serif;
    --font-mono:
    ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono",
    "Courier New", monospace;
    --radius: 0.375rem;
    --shadow-x: 0px;
    --shadow-y: 5px;
    --shadow-blur: 3px;
    --shadow-spread: 0px;
    --shadow-opacity: 0.1;
    --shadow-color: #000000;
    --shadow-2xs: 0px 5px 3px 0px hsl(0 0% 0% / 0.05);
    --shadow-xs: 0px 5px 3px 0px hsl(0 0% 0% / 0.05);
    --shadow-sm:
    0px 5px 3px 0px hsl(0 0% 0% / 0.1), 0px 1px 2px -1px hsl(0 0% 0% / 0.1);
    --shadow:
    0px 5px 3px 0px hsl(0 0% 0% / 0.1), 0px 1px 2px -1px hsl(0 0% 0% / 0.1);
    --shadow-md:
    0px 5px 3px 0px hsl(0 0% 0% / 0.1), 0px 2px 4px -1px hsl(0 0% 0% / 0.1);
    --shadow-lg:
    0px 5px 3px 0px hsl(0 0% 0% / 0.1), 0px 4px 6px -1px hsl(0 0% 0% / 0.1);
    --shadow-xl:
    0px 5px 3px 0px hsl(0 0% 0% / 0.1), 0px 8px 10px -1px hsl(0 0% 0% / 0.1);
    --shadow-2xl: 0px 5px 3px 0px hsl(0 0% 0% / 0.25);
    --tracking-normal: 0em;
    --spacing: 0.25rem;
    --preview-hero-bg: #030d0f;
    --preview-hero-fg: #e1eaea;
    --preview-hero-muted: #619b9e;
    --preview-icon-circle: #04181c;
    }
    text {
      font-family: var(--font-sans), system-ui, sans-serif;
    }
  </style>
  <rect width="320" height="200" rx="6" fill="var(--background)"/>
  <rect x="24" y="20" width="272" height="160" rx="16" fill="var(--muted)"/>
  <text x="160" y="64" text-anchor="middle" fill="var(--foreground)" font-size="14" font-weight="700">Stay Updated</text>
  <text x="160" y="82" text-anchor="middle" fill="var(--muted-foreground)" font-size="7">Get the latest legal insights and firm news</text>
  <text x="160" y="93" text-anchor="middle" fill="var(--muted-foreground)" font-size="7">delivered straight to your inbox.</text>
  <rect x="88" y="108" width="144" height="30" rx="8" fill="var(--background)" stroke="var(--border)" stroke-width="1"/>
  <text x="104" y="127" fill="var(--muted-foreground)" font-size="7">Enter your email address</text>
  <rect x="204" y="113" width="22" height="20" rx="6" fill="var(--border)"/>
  <text x="215" y="126" text-anchor="middle" fill="var(--foreground)" font-size="9">›</text>
  <text x="160" y="154" text-anchor="middle" fill="var(--muted-foreground)" opacity="0.6" font-size="5.5">We respect your privacy. Unsubscribe anytime.</text>
</svg>
