<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" fill="none">
  <style>
    :root {
    --background: #f1f6f6;
    --foreground: #061414;
    --card: #e4eded;
    --card-foreground: #061414;
    --popover: #f6fbfb;
    --popover-foreground: #061414;
    --primary: #006574;
    --primary-foreground: #f6fbfb;
    --secondary: #ec6100;
    --secondary-foreground: #f6fbfb;
    --muted: #d9e4e4;
    --muted-foreground: #006574;
    --accent: #c2e7e1;
    --accent-foreground: #061414;
    --destructive: #1f1f1f;
    --destructive-foreground: #f6fbfb;
    --border: #b0c2c2;
    --input: #006574;
    --ring: #ec6100;
    --chart-1: #006574;
    --chart-2: #ec6100;
    --chart-3: #c2e7e1;
    --chart-4: #b0c2c2;
    --chart-5: #1f1f1f;
    --sidebar: #e4eded;
    --sidebar-foreground: #061414;
    --sidebar-primary: #006574;
    --sidebar-primary-foreground: #f6fbfb;
    --sidebar-accent: #ec6100;
    --sidebar-accent-foreground: #f6fbfb;
    --sidebar-border: #b0c2c2;
    --sidebar-ring: #ec6100;
    --font-sans: Roboto, ui-sans-serif, system-ui, sans-serif;
    --font-serif: ui-serif, Georgia, Cambria, "Times New Roman", Times, serif;
    --font-mono:
    ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono",
    "Courier New", monospace;
    --radius: 0.375rem;
    --shadow-x: 0px;
    --shadow-y: 5px;
    --shadow-blur: 3px;
    --shadow-spread: 0px;
    --shadow-opacity: 0.1;
    --shadow-color: #000000;
    --shadow-2xs: 0px 5px 3px 0px hsl(0 0% 0% / 0.05);
    --shadow-xs: 0px 5px 3px 0px hsl(0 0% 0% / 0.05);
    --shadow-sm:
    0px 5px 3px 0px hsl(0 0% 0% / 0.1), 0px 1px 2px -1px hsl(0 0% 0% / 0.1);
    --shadow:
    0px 5px 3px 0px hsl(0 0% 0% / 0.1), 0px 1px 2px -1px hsl(0 0% 0% / 0.1);
    --shadow-md:
    0px 5px 3px 0px hsl(0 0% 0% / 0.1), 0px 2px 4px -1px hsl(0 0% 0% / 0.1);
    --shadow-lg:
    0px 5px 3px 0px hsl(0 0% 0% / 0.1), 0px 4px 6px -1px hsl(0 0% 0% / 0.1);
    --shadow-xl:
    0px 5px 3px 0px hsl(0 0% 0% / 0.1), 0px 8px 10px -1px hsl(0 0% 0% / 0.1);
    --shadow-2xl: 0px 5px 3px 0px hsl(0 0% 0% / 0.25);
    --tracking-normal: 0em;
    --spacing: 0.25rem;
    --preview-hero-bg: #030d0f;
    --preview-hero-fg: #e1eaea;
    --preview-hero-muted: #619b9e;
    --preview-icon-circle: #04181c;
    }
    text {
      font-family: var(--font-sans), system-ui, sans-serif;
    }
  </style>
  <rect width="320" height="200" rx="6" fill="var(--background)"/>
  <text x="160" y="30" text-anchor="middle" fill="var(--foreground)" font-size="14" font-weight="700">About Our Practice</text>
  <text x="70" y="54" fill="var(--secondary-foreground)" font-size="6.5">Our firm has been serving the community for over two</text>
  <text x="70" y="64" fill="var(--secondary-foreground)" font-size="6.5">decades, providing compassionate and effective legal</text>
  <text x="70" y="74" fill="var(--secondary-foreground)" font-size="6.5">representation to those who need it most.</text>
  <text x="70" y="92" fill="var(--secondary-foreground)" font-size="6.5">We specialize in personal injury, medical malpractice,</text>
  <text x="70" y="102" fill="var(--secondary-foreground)" font-size="6.5">and workplace accidents. Every client receives</text>
  <text x="70" y="112" fill="var(--secondary-foreground)" font-size="6.5">personalized attention from our experienced team.</text>
  <text x="70" y="130" fill="var(--secondary-foreground)" font-size="6.5">Our mission is simple: fight for justice and ensure our</text>
  <text x="70" y="140" fill="var(--secondary-foreground)" font-size="6.5">clients receive the compensation they deserve. We've</text>
  <text x="70" y="150" fill="var(--secondary-foreground)" font-size="6.5">recovered millions in settlements and verdicts.</text>
  <text x="70" y="168" fill="var(--secondary-foreground)" font-size="6.5">Contact us today for a free consultation and let us</text>
  <text x="70" y="178" fill="var(--secondary-foreground)" font-size="6.5">help you understand your legal options.</text>
</svg>
