<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" fill="none">
  <style>
    :root {
    --background: #f1f6f6;
    --foreground: #061414;
    --card: #e4eded;
    --card-foreground: #061414;
    --popover: #f6fbfb;
    --popover-foreground: #061414;
    --primary: #006574;
    --primary-foreground: #f6fbfb;
    --secondary: #ec6100;
    --secondary-foreground: #f6fbfb;
    --muted: #d9e4e4;
    --muted-foreground: #006574;
    --accent: #c2e7e1;
    --accent-foreground: #061414;
    --destructive: #1f1f1f;
    --destructive-foreground: #f6fbfb;
    --border: #b0c2c2;
    --input: #006574;
    --ring: #ec6100;
    --chart-1: #006574;
    --chart-2: #ec6100;
    --chart-3: #c2e7e1;
    --chart-4: #b0c2c2;
    --chart-5: #1f1f1f;
    --sidebar: #e4eded;
    --sidebar-foreground: #061414;
    --sidebar-primary: #006574;
    --sidebar-primary-foreground: #f6fbfb;
    --sidebar-accent: #ec6100;
    --sidebar-accent-foreground: #f6fbfb;
    --sidebar-border: #b0c2c2;
    --sidebar-ring: #ec6100;
    --font-sans: Roboto, ui-sans-serif, system-ui, sans-serif;
    --font-serif: ui-serif, Georgia, Cambria, "Times New Roman", Times, serif;
    --font-mono:
    ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono",
    "Courier New", monospace;
    --radius: 0.375rem;
    --shadow-x: 0px;
    --shadow-y: 5px;
    --shadow-blur: 3px;
    --shadow-spread: 0px;
    --shadow-opacity: 0.1;
    --shadow-color: #000000;
    --shadow-2xs: 0px 5px 3px 0px hsl(0 0% 0% / 0.05);
    --shadow-xs: 0px 5px 3px 0px hsl(0 0% 0% / 0.05);
    --shadow-sm:
    0px 5px 3px 0px hsl(0 0% 0% / 0.1), 0px 1px 2px -1px hsl(0 0% 0% / 0.1);
    --shadow:
    0px 5px 3px 0px hsl(0 0% 0% / 0.1), 0px 1px 2px -1px hsl(0 0% 0% / 0.1);
    --shadow-md:
    0px 5px 3px 0px hsl(0 0% 0% / 0.1), 0px 2px 4px -1px hsl(0 0% 0% / 0.1);
    --shadow-lg:
    0px 5px 3px 0px hsl(0 0% 0% / 0.1), 0px 4px 6px -1px hsl(0 0% 0% / 0.1);
    --shadow-xl:
    0px 5px 3px 0px hsl(0 0% 0% / 0.1), 0px 8px 10px -1px hsl(0 0% 0% / 0.1);
    --shadow-2xl: 0px 5px 3px 0px hsl(0 0% 0% / 0.25);
    --tracking-normal: 0em;
    --spacing: 0.25rem;
    --preview-hero-bg: #030d0f;
    --preview-hero-fg: #e1eaea;
    --preview-hero-muted: #619b9e;
    --preview-icon-circle: #04181c;
    }
    text {
      font-family: var(--font-sans), system-ui, sans-serif;
    }
  </style>
  <rect width="320" height="200" rx="6" fill="var(--background)"/>
  <rect x="128" y="8" width="64" height="16" rx="8" fill="var(--border)"/>
  <text x="160" y="19" text-anchor="middle" fill="var(--secondary-foreground)" font-size="6.5">Why Us</text>
  <text x="160" y="40" text-anchor="middle" fill="var(--foreground)" font-size="13" font-weight="700">Why Choose Our Firm</text>
  <text x="160" y="54" text-anchor="middle" fill="var(--muted-foreground)" font-size="6.5">We bring experience, dedication, and results</text>
  <rect x="14" y="68" width="90" height="120" rx="12" fill="var(--muted)"/>
  <circle cx="38" cy="88" r="12" fill="var(--background)"/>
  <text x="38" y="92" text-anchor="middle" fill="var(--muted-foreground)" font-size="10">⚖</text>
  <text x="24" y="112" fill="var(--foreground)" font-size="7" font-weight="600">Expert Legal</text>
  <text x="24" y="122" fill="var(--foreground)" font-size="7" font-weight="600">Counsel</text>
  <text x="24" y="136" fill="var(--muted-foreground)" font-size="5.5">Decades of courtroom</text>
  <text x="24" y="144" fill="var(--muted-foreground)" font-size="5.5">experience in personal</text>
  <text x="24" y="152" fill="var(--muted-foreground)" font-size="5.5">injury law.</text>
  <rect x="114" y="68" width="90" height="120" rx="12" fill="var(--muted)"/>
  <circle cx="138" cy="88" r="12" fill="var(--background)"/>
  <text x="138" y="92" text-anchor="middle" fill="var(--muted-foreground)" font-size="10">🤝</text>
  <text x="124" y="112" fill="var(--foreground)" font-size="7" font-weight="600">No Win,</text>
  <text x="124" y="122" fill="var(--foreground)" font-size="7" font-weight="600">No Fee</text>
  <text x="124" y="136" fill="var(--muted-foreground)" font-size="5.5">You pay nothing unless</text>
  <text x="124" y="144" fill="var(--muted-foreground)" font-size="5.5">we secure your</text>
  <text x="124" y="152" fill="var(--muted-foreground)" font-size="5.5">compensation.</text>
  <rect x="214" y="68" width="90" height="120" rx="12" fill="var(--muted)"/>
  <circle cx="238" cy="88" r="12" fill="var(--background)"/>
  <text x="238" y="92" text-anchor="middle" fill="var(--muted-foreground)" font-size="10">★</text>
  <text x="224" y="112" fill="var(--foreground)" font-size="7" font-weight="600">Proven Track</text>
  <text x="224" y="122" fill="var(--foreground)" font-size="7" font-weight="600">Record</text>
  <text x="224" y="136" fill="var(--muted-foreground)" font-size="5.5">Millions recovered for</text>
  <text x="224" y="144" fill="var(--muted-foreground)" font-size="5.5">our clients across</text>
  <text x="224" y="152" fill="var(--muted-foreground)" font-size="5.5">hundreds of cases.</text>
</svg>
