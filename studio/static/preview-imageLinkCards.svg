<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" fill="none">
  <style>
    :root {
    --background: #f1f6f6;
    --foreground: #061414;
    --card: #e4eded;
    --card-foreground: #061414;
    --popover: #f6fbfb;
    --popover-foreground: #061414;
    --primary: #006574;
    --primary-foreground: #f6fbfb;
    --secondary: #ec6100;
    --secondary-foreground: #f6fbfb;
    --muted: #d9e4e4;
    --muted-foreground: #006574;
    --accent: #c2e7e1;
    --accent-foreground: #061414;
    --destructive: #1f1f1f;
    --destructive-foreground: #f6fbfb;
    --border: #b0c2c2;
    --input: #006574;
    --ring: #ec6100;
    --chart-1: #006574;
    --chart-2: #ec6100;
    --chart-3: #c2e7e1;
    --chart-4: #b0c2c2;
    --chart-5: #1f1f1f;
    --sidebar: #e4eded;
    --sidebar-foreground: #061414;
    --sidebar-primary: #006574;
    --sidebar-primary-foreground: #f6fbfb;
    --sidebar-accent: #ec6100;
    --sidebar-accent-foreground: #f6fbfb;
    --sidebar-border: #b0c2c2;
    --sidebar-ring: #ec6100;
    --font-sans: Roboto, ui-sans-serif, system-ui, sans-serif;
    --font-serif: ui-serif, Georgia, Cambria, "Times New Roman", Times, serif;
    --font-mono:
    ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono",
    "Courier New", monospace;
    --radius: 0.375rem;
    --shadow-x: 0px;
    --shadow-y: 5px;
    --shadow-blur: 3px;
    --shadow-spread: 0px;
    --shadow-opacity: 0.1;
    --shadow-color: #000000;
    --shadow-2xs: 0px 5px 3px 0px hsl(0 0% 0% / 0.05);
    --shadow-xs: 0px 5px 3px 0px hsl(0 0% 0% / 0.05);
    --shadow-sm:
    0px 5px 3px 0px hsl(0 0% 0% / 0.1), 0px 1px 2px -1px hsl(0 0% 0% / 0.1);
    --shadow:
    0px 5px 3px 0px hsl(0 0% 0% / 0.1), 0px 1px 2px -1px hsl(0 0% 0% / 0.1);
    --shadow-md:
    0px 5px 3px 0px hsl(0 0% 0% / 0.1), 0px 2px 4px -1px hsl(0 0% 0% / 0.1);
    --shadow-lg:
    0px 5px 3px 0px hsl(0 0% 0% / 0.1), 0px 4px 6px -1px hsl(0 0% 0% / 0.1);
    --shadow-xl:
    0px 5px 3px 0px hsl(0 0% 0% / 0.1), 0px 8px 10px -1px hsl(0 0% 0% / 0.1);
    --shadow-2xl: 0px 5px 3px 0px hsl(0 0% 0% / 0.25);
    --tracking-normal: 0em;
    --spacing: 0.25rem;
    --preview-hero-bg: #030d0f;
    --preview-hero-fg: #e1eaea;
    --preview-hero-muted: #619b9e;
    --preview-icon-circle: #04181c;
    }
    text {
      font-family: var(--font-sans), system-ui, sans-serif;
    }
  </style>
  <rect width="320" height="200" rx="6" fill="var(--background)"/>
  <rect x="125" y="8" width="70" height="16" rx="8" fill="var(--border)"/>
  <text x="160" y="19" text-anchor="middle" fill="var(--secondary-foreground)" font-size="6.5">Resources</text>
  <text x="160" y="40" text-anchor="middle" fill="var(--foreground)" font-size="13" font-weight="700">Helpful Resources</text>
  <text x="160" y="54" text-anchor="middle" fill="var(--muted-foreground)" font-size="6.5">Explore guides, tools, and more</text>
  <rect x="16" y="66" width="70" height="122" rx="12" fill="var(--muted)"/>
  <rect x="16" y="66" width="70" height="48" rx="12" fill="var(--border)" opacity="0.6"/>
  <text x="24" y="126" fill="var(--foreground)" font-size="6.5" font-weight="600">Case Types</text>
  <text x="24" y="136" fill="var(--muted-foreground)" font-size="5">Learn about the types</text>
  <text x="24" y="144" fill="var(--muted-foreground)" font-size="5">of cases we handle</text>
  <rect x="87" y="66" width="70" height="122" fill="var(--muted)"/>
  <rect x="87" y="66" width="70" height="48" fill="var(--border)" opacity="0.6"/>
  <text x="95" y="126" fill="var(--foreground)" font-size="6.5" font-weight="600">Free Guides</text>
  <text x="95" y="136" fill="var(--muted-foreground)" font-size="5">Download our legal</text>
  <text x="95" y="144" fill="var(--muted-foreground)" font-size="5">resource library</text>
  <rect x="158" y="66" width="70" height="122" fill="var(--muted)"/>
  <rect x="158" y="66" width="70" height="48" fill="var(--border)" opacity="0.6"/>
  <text x="166" y="126" fill="var(--foreground)" font-size="6.5" font-weight="600">Blog</text>
  <text x="166" y="136" fill="var(--muted-foreground)" font-size="5">Read the latest from</text>
  <text x="166" y="144" fill="var(--muted-foreground)" font-size="5">our legal team</text>
  <rect x="229" y="66" width="70" height="122" rx="12" fill="var(--muted)"/>
  <rect x="229" y="66" width="70" height="48" rx="12" fill="var(--border)" opacity="0.6"/>
  <text x="237" y="126" fill="var(--foreground)" font-size="6.5" font-weight="600">Contact</text>
  <text x="237" y="136" fill="var(--muted-foreground)" font-size="5">Reach out for a free</text>
  <text x="237" y="144" fill="var(--muted-foreground)" font-size="5">consultation today</text>
</svg>
